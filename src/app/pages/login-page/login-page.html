<form [formRoot]="form">
  <mat-form-field>
    <mat-label>Username</mat-label>
    <input type="text" matInput [formField]="form.username" />
  </mat-form-field>

  <mat-form-field>
    <mat-label>Password</mat-label>
    <input type="password" matInput [formField]="form.password" />
  </mat-form-field>

  <button type="submit" matButton>Login</button>
</form>
