<style>
  .qb-torrents-list-page {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .qb-torrents-list-page__actions-container {
    display: flex;
    justify-content: center;
    padding: 16px;
  }

  .qb-torrents-list-page__content {
    flex: 1 1 0;
    overflow: auto;
  }
</style>

<qb-torrents-top-toolbar
  [(selectMode)]="selectMode"
  [selectedCount]="selected().size"
  (add)="onAdd()"
/>

<div class="qb-torrents-list-page__content">
  <qb-torrents-list
    [torrents]="torrents()"
    [selectMode]="selectMode()"
    [(selected)]="selected"
    (resume)="onResume($event)"
    (forceResume)="onForceResume($event)"
    (pause)="onPause($event)"
    (delete)="onDelete($event)"
  />
</div>

@if (selectMode()) {
  <footer class="qb-torrents-list-page__actions-container">
    <qb-torrents-actions
      style="margin: 0 auto"
      [selected]="selected()"
      (maxPriority)="onMaxPriority()"
      (incPriority)="onIncPriority()"
      (decPriority)="onDecPriority()"
      (minPriority)="onMinPriority()"
      (resume)="onResume()"
      (forceResume)="onForceResume()"
      (pause)="onPause()"
      (delete)="onDelete()"
    />
  </footer>
}
