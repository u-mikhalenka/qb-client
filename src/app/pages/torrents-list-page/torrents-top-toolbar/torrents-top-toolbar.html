@if (!selectMode()) {
  <span></span>
  <button type="button" matIconButton [matMenuTriggerFor]="menuMore">
    <mat-icon fontIcon="more_vert" />
  </button>
} @else {
  <button type="button" matButton>Select All</button>

  @switch (selectedCount()) {
    @case (0) {
      <span>Select items</span>
    }

    @case (1) {
      <span>{{ selectedCount() }} item</span>
    }

    @default {
      <span>{{ selectedCount() }} items</span>
    }
  }

  <button type="button" matIconButton (click)="selectMode.set(false)">
    <mat-icon fontIcon="close" />
  </button>
}

<mat-menu #menuMore>
  <button type="button" mat-menu-item (click)="add.emit()">Add</button>
  <button type="button" mat-menu-item (click)="selectMode.set(true)">Select</button>
</mat-menu>
