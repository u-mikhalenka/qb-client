@if (!selectMode()) {
  <button type="button" matButton (click)="selectMode.set(true)">Select</button>
} @else {
  <button type="button" matButton>Select All</button>

  @switch (selectedCount()) {
    @case (0) {
      <span>Select items</span>
    }

    @case (1) {
      <span>{{ selectedCount() }} item</span>
    }

    @default {
      <span>{{ selectedCount() }} items</span>
    }
  }

  <button type="button" matIconButton (click)="selectMode.set(false)">
    <mat-icon fontIcon="close" />
  </button>
}
