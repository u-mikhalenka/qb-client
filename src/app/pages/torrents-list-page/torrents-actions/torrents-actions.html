<button
  type="button"
  matIconButton
  size="s"
  appearance="secondary"
  [disabled]="!hasSelection()"
  (click)="maxPriority.emit()"
>
  <mat-icon fontIcon="keyboard_double_arrow_up" />
</button>
<button
  type="button"
  matIconButton
  size="s"
  appearance="secondary"
  [disabled]="!hasSelection()"
  (click)="incPriority.emit()"
>
  <mat-icon fontIcon="keyboard_arrow_up" />
</button>
<button
  type="button"
  matIconButton
  size="s"
  appearance="secondary"
  [disabled]="!hasSelection()"
  (click)="decPriority.emit()"
>
  <mat-icon fontIcon="keyboard_arrow_down" />
</button>
<button
  type="button"
  matIconButton
  size="s"
  appearance="secondary"
  [disabled]="!hasSelection()"
  (click)="minPriority.emit()"
>
  <mat-icon fontIcon="keyboard_double_arrow_down" />
</button>

<mat-divider vertical />

<button
  type="button"
  matIconButton
  size="s"
  appearance="secondary"
  [disabled]="!hasSelection()"
  (click)="resume.emit()"
>
  <mat-icon fontIcon="play_arrow" />
</button>

<button
  type="button"
  matIconButton
  size="s"
  appearance="secondary"
  [disabled]="!hasSelection()"
  (click)="forceResume.emit()"
>
  <mat-icon fontIcon="fast_forward" />
</button>

<button
  type="button"
  matIconButton
  size="s"
  appearance="secondary"
  [disabled]="!hasSelection()"
  (click)="pause.emit()"
>
  <mat-icon fontIcon="pause" />
</button>

<button
  type="button"
  matIconButton
  size="s"
  appearance="secondary-destructive"
  style="margin-right: auto"
  [disabled]="!hasSelection()"
  (click)="deleteDialogOpen.set(true)"
>
  <mat-icon fontIcon="delete" />
</button>

<ng-template #deleteDialog>
  <h2 mat-dialog-title>Delete torrent?</h2>
  <form (ngSubmit)="onDeleteFilesSubmit()">
    <mat-dialog-content>
      <mat-checkbox name="deleteFiles" [(ngModel)]="deleteFiles">Delete files</mat-checkbox>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button type="submit" matButton color="warn">Delete</button>
    </mat-dialog-actions>
  </form>
</ng-template>
